<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PXL GeoInt Solutions | Leading GIS & Location Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
        /* Your existing styles */
        .hero-bg { background-image: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)), url('https://picsum.photos/id/1015/1920/1080'); background-size: cover; background-position: center; }
        /* ... rest of your styles ... */
    </style>
</head>
<body class="font-sans bg-gray-50 text-gray-800">
    <!-- Your existing HTML content (Navbar, Hero, Sections, Footer) remains the same -->

    <!-- Contact Modal -->
    <div id="contactModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
        <div class="bg-white rounded-3xl max-w-lg w-full mx-4 overflow-hidden">
            <div class="px-8 pt-8 pb-6 border-b">
                <h3 class="text-3xl font-semibold">Let's Connect</h3>
                <p class="text-gray-500">Tell us about your GIS requirements</p>
            </div>
            
            <form id="contactForm" class="p-8 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="firstName" placeholder="First Name" required class="border border-gray-200 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500">
                    <input type="text" id="lastName" placeholder="Last Name" required class="border border-gray-200 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500">
                </div>
                <input type="email" id="email" placeholder="Business Email" required class="w-full border border-gray-200 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500">
                <input type="tel" id="phone" placeholder="Phone Number" class="w-full border border-gray-200 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500">
                <textarea id="message" placeholder="Tell us about your project..." rows="5" required class="w-full border border-gray-200 rounded-3xl px-5 py-4 focus:outline-none focus:border-blue-500"></textarea>
                
                <button type="submit" 
                        class="w-full bg-blue-700 hover:bg-blue-800 text-white py-5 rounded-3xl font-semibold text-lg transition">
                    Send Message
                </button>
            </form>
            
            <div onclick="hideContactModal()" class="text-center py-6 text-gray-400 hover:text-gray-600 cursor-pointer text-sm font-medium border-t">
                Close
            </div>
        </div>
    </div>

    <script>
        // Initialize EmailJS
        (function(){
            emailjs.init("YOUR_PUBLIC_KEY");   // ← Replace with your EmailJS Public Key
        })();

        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.innerHTML = 'Sending...';
            submitBtn.disabled = true;

            const templateParams = {
                from_name: document.getElementById('firstName').value + " " + document.getElementById('lastName').value,
                from_email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                message: document.getElementById('message').value,
                to_email: "pxlgispl@gmail.com"
            };

            emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', templateParams)
                .then(() => {
                    alert("✅ Thank you! Your message has been sent successfully.");
                    hideContactModal();
                    document.getElementById('contactForm').reset();
                })
                .catch((error) => {
                    alert("❌ Failed to send message. Please try again or email us directly at pxlgispl@gmail.com");
                    console.error(error);
                })
                .finally(() => {
                    submitBtn.innerHTML = 'Send Message';
                    submitBtn.disabled = false;
                });
        });

        // Your existing functions
        function showContactModal() {
            document.getElementById('contactModal').classList.remove('hidden');
            document.getElementById('contactModal').classList.add('flex');
        }
        
        function hideContactModal() {
            const modal = document.getElementById('contactModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }
    </script>
</body>
</html>
